<!DOCTYPE html>
<html>

<head>
    <title>Streaming Voice AI</title>
</head>

<body>

    <h1>Real-Time Voice AI Agent</h1>

    <button id="startBtn">
        Start Streaming
    </button>

    <button id="stopBtn">
        Stop Streaming
    </button>

    <h2>Transcript</h2>

    <p id="transcript"></p>

    <h2>Response</h2>

    <p id="response"></p>

    <script>

        const transcriptEl =
            document.getElementById(
                "transcript"
            )

        const responseEl =
            document.getElementById(
                "response"
            )

        const protocol =
            window.location.protocol === "https:"
                ? "wss:"
                : "ws:"

        const socket = new WebSocket(
            `${protocol}//${window.location.host}/ws`
        )

        let mediaRecorder

        let currentAudio = null

        socket.onmessage = async (
            event
        ) => {

            const data = JSON.parse(
                event.data
            )

            if (data.transcript) {

                transcriptEl.innerText =
                    data.transcript
            }

            if (data.response) {

                responseEl.innerText =
                    data.response

                if (currentAudio) {

                    currentAudio.pause()

                    currentAudio.currentTime = 0
                }

                currentAudio = new Audio(
                    "data:audio/mp3;base64," +
                    data.audio_base64
                )

                currentAudio.play()
            }
        }

        document.getElementById(
            "startBtn"
        ).onclick = async () => {

            const stream =
                await navigator
                    .mediaDevices
                    .getUserMedia({
                        audio: true
                    })

            mediaRecorder =
                new MediaRecorder(
                    stream
                )

            mediaRecorder.ondataavailable =
                async event => {

                    if (
                        event.data.size > 0
                    ) {

                        if (currentAudio) {

                            currentAudio.pause()

                            currentAudio.currentTime = 0
                        }

                        const arrayBuffer =
                            await event.data
                                .arrayBuffer()

                        socket.send(
                            arrayBuffer
                        )
                    }
                }

            mediaRecorder.start(1000)
        }

        document.getElementById(
            "stopBtn"
        ).onclick = () => {

            mediaRecorder.stop()
        }

    </script>

</body>

</html>
