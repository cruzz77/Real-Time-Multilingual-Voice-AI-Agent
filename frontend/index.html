<!DOCTYPE html>
<html>

<head>
    <title>Streaming Voice AI</title>
</head>

<body>

    <h1>Streaming Voice AI Agent</h1>

    <button id="startBtn">
        Start Streaming
    </button>

    <button id="stopBtn">
        Stop Streaming
    </button>

    <h2>Transcript</h2>

    <p id="transcript"></p>

    <h2>Response</h2>

    <p id="response"></p>

    <script>

        const transcriptEl =
            document.getElementById(
                "transcript"
            )

        const responseEl =
            document.getElementById(
                "response"
            )

        const socket = new WebSocket(
            "ws://localhost:8000/ws"
        )

        let mediaRecorder

        socket.onmessage = async (
            event
        ) => {

            const data = JSON.parse(
                event.data
            )

            if (data.transcript) {

                transcriptEl.innerText =
                    data.transcript
            }

            if (data.response) {

                responseEl.innerText =
                    data.response

                const audio =
                    new Audio(
                        "data:audio/mp3;base64," +
                        data.audio_base64
                    )

                audio.play()
            }
        }

        document.getElementById(
            "startBtn"
        ).onclick = async () => {

            const stream =
                await navigator
                    .mediaDevices
                    .getUserMedia({
                        audio: true
                    })

            mediaRecorder =
                new MediaRecorder(
                    stream
                )

            mediaRecorder.ondataavailable =
                async event => {

                    if (
                        event.data.size > 0
                    ) {

                        const arrayBuffer =
                            await event.data
                                .arrayBuffer()

                        socket.send(
                            arrayBuffer
                        )
                    }
                }

            mediaRecorder.start(1000)
        }

        document.getElementById(
            "stopBtn"
        ).onclick = () => {

            mediaRecorder.stop()
        }

    </script>

</body>

</html>
