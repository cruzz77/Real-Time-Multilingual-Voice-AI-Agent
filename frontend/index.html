<!DOCTYPE html>
<html>

<head>

    <title>
        Real-Time Voice AI
    </title>

    <style>

        body {

            margin: 0;

            font-family: Arial, sans-serif;

            background: #0f172a;

            color: white;
        }

        .container {

            max-width: 900px;

            margin: auto;

            padding: 40px;
        }

        h1 {

            text-align: center;

            margin-bottom: 40px;
        }

        .controls {

            display: flex;

            justify-content: center;

            gap: 20px;

            margin-bottom: 30px;
        }

        button {

            padding: 14px 24px;

            border: none;

            border-radius: 10px;

            cursor: pointer;

            font-size: 16px;

            font-weight: bold;
        }

        #startBtn {

            background: #10b981;

            color: white;
        }

        #stopBtn {

            background: #ef4444;

            color: white;
        }

        .card {

            background: #1e293b;

            padding: 25px;

            border-radius: 16px;

            margin-bottom: 20px;
        }

        h2 {

            margin-top: 0;

            color: #38bdf8;
        }

        #status {

            text-align: center;

            margin-bottom: 20px;

            color: #facc15;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>
            🎙️ Real-Time Multilingual Voice AI
        </h1>

        <div id="status">
            Idle
        </div>

        <div class="controls">

            <button id="startBtn">
                Start Streaming
            </button>

            <button id="stopBtn">
                Stop Streaming
            </button>

        </div>

        <div class="card">

            <h2>
                Transcript
            </h2>

            <p id="transcript">
                Waiting...
            </p>

        </div>

        <div class="card">

            <h2>
                AI Response
            </h2>

            <p id="response">
                Waiting...
            </p>

        </div>

    </div>
<script>

    const transcriptEl =
        document.getElementById(
            "transcript"
        )

    const responseEl =
        document.getElementById(
            "response"
        )

    const statusEl =
        document.getElementById(
            "status"
        )

    const socket = new WebSocket(
        "ws://localhost:8000/ws"
        )

        let mediaRecorder

        let audioChunks = []

        let stream

        socket.onopen = () => {

            statusEl.innerText =
                "Connected"
        }

        socket.onmessage = (
            event
        ) => {

            const data = JSON.parse(
                event.data
            )

            if (data.transcript) {

                transcriptEl.innerText =
                    data.transcript
            }

            if (data.response) {

                responseEl.innerText =
                    data.response
            }
        }

        socket.onerror = () => {

            statusEl.innerText =
                "WebSocket Error"
        }

        document.getElementById(
            "startBtn"
        ).onclick = async () => {

            transcriptEl.innerText =
                "Listening..."

            responseEl.innerText =
                "Waiting..."

            audioChunks = []

            stream =
                await navigator
                    .mediaDevices
                    .getUserMedia({
                        audio: true
                    })

            mediaRecorder =
                new MediaRecorder(
                    stream
                )

            mediaRecorder.ondataavailable =
                event => {

                    if (
                        event.data.size > 0
                    ) {

                        audioChunks.push(
                            event.data
                        )
                    }
                }

            mediaRecorder.onstop =
                async () => {

                    const audioBlob =
                        new Blob(
                            audioChunks,
                            {
                                type: "audio/webm"
                            }
                        )

                    const arrayBuffer =
                        await audioBlob
                            .arrayBuffer()

                    socket.send(
                        arrayBuffer
                    )

                    statusEl.innerText =
                        "Processing..."
                }

            mediaRecorder.start()

            statusEl.innerText =
                "Recording..."
        }

        document.getElementById(
            "stopBtn"
        ).onclick = () => {

            if (mediaRecorder) {

                mediaRecorder.stop()

                stream.getTracks()
                    .forEach(
                        track => track.stop()
                    )

                statusEl.innerText =
                    "Stopped"
            }
        }

    </script>
</body>

</html>
